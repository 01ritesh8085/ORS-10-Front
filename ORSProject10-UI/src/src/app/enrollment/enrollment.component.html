<app-navbar></app-navbar>

<style>
  .grad {
    background-image: linear-gradient(to bottom right, rgb(32, 168, 168), rgb(219, 231, 237));
    background-repeat: no-repeat;
    background-size: 100%;
    padding-bottom: 25px;
  }

  .background {
    padding-top: 3%;
    padding-bottom: 13%;
    background: url('assets/files/wall.jpg') no-repeat center center;
    background-attachment: fixed;
    background-size: cover;
    width: 100%;
    height: auto;
  }

  .required-field {
    color: red;
  }

  .alertRedColor {
    color: red;
  }
</style>

<div class="container-fluid background" style="padding-top: 12%">
  <div class="row justify-content-center">
    <div class="col-sm-8 col-md-6 col-lg-4">
      <div class="card">
        <div class="card-body shadow-lg grad">

          <form name="enrollmentForm">

            <h2 *ngIf="!form.data.id" class="text-primary font-weight-bold text-center">
              Add Enrollment
            </h2>

            <h2 *ngIf="form.data.id" class="text-primary font-weight-bold text-center">
              Update Enrollment
            </h2>

            <!-- Messages -->
            <div *ngIf="form.error && form.message" class="alert alert-danger alert-dismissible fade show">
              <button type="button" class="close" data-dismiss="alert">&times;</button>
              {{ form.message }}
            </div>

            <div *ngIf="!form.error && form.message" class="alert alert-success alert-dismissible fade show">
              <button type="button" class="close" data-dismiss="alert">&times;</button>
              {{ form.message }}
            </div>

            <!-- Enrollment Code -->
            <div class="form-group pt-2">
              <label><b>Enrollment Code</b><span class="required-field">*</span></label>
              <input type="text" name="enrollmentCode" [(ngModel)]="form.data.enrollmentCode"
                class="form-control" placeholder="Enter Enrollment Code">

              <span *ngIf="form.inputerror.enrollmentCode" class="alertRedColor">
                {{ form.inputerror.enrollmentCode }}
              </span>
            </div>

            <!-- Student Name -->
            <div class="form-group pt-2">
              <label><b>Student Name</b><span class="required-field">*</span></label>
              <input type="text" name="studentName" [(ngModel)]="form.data.studentName"
                class="form-control" placeholder="Enter Student Name">

              <span *ngIf="form.inputerror.studentName" class="alertRedColor">
                {{ form.inputerror.studentName }}
              </span>
            </div>

            <!-- Enrollment Date -->
            <div class="form-group pt-2">
              <label><b>Enrollment Date</b><span class="required-field">*</span></label>
              <input type="date" name="enrollmentDate" [(ngModel)]="form.data.enrollmentDate"
                class="form-control">

              <span *ngIf="form.inputerror.enrollmentDate" class="alertRedColor">
                {{ form.inputerror.enrollmentDate }}
              </span>
            </div>

            <!-- Enrollment Status -->
            <div class="form-group pt-2">
              <label><b>Enrollment Status</b><span class="required-field">*</span></label>
              <select class="form-control" name="enrollmentStatus" [(ngModel)]="form.data.enrollmentStatus">
                <option [ngValue]="undefined">Select Status</option>

                <option *ngFor="let s of form.preload.statusList | keyvalue" [value]="s.value">
                  {{ s.value }}
                </option>
              </select>

              <span *ngIf="form.inputerror.enrollmentStatus" class="alertRedColor">
                {{ form.inputerror.enrollmentStatus }}
              </span>
            </div>

            <!-- Buttons -->
            <div class="row pt-2 pl-2 pb-3">

              <div class="col-md-3"></div>

              <div class="pt-2">
                <button *ngIf="!form.data.id > 0" (click)="submit()" class="btn btn-success mr-2">
                  Save
                </button>
              </div>

              <div class="col-md-1"></div>

              <div class="pt-2">
                <button *ngIf="form.data.id > 0" (click)="submit()" class="btn btn-success mr-2">
                  Update
                </button>
              </div>

              <div class="pt-2">
                <a class="btn btn-warning mr-1" [routerLink]="['/enrollmentlist']"
                  style="color:white;text-decoration:none">
                  List
                </a>
              </div>

            </div>

          </form>

        </div>
      </div>
    </div>
  </div>
</div>

<app-footer></app-footer>
